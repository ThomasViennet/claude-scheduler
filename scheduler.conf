# claude-scheduler configuration.
# WARNING: this file is SOURCED (executed as shell code) by ping.sh and
# apply-schedule.sh — any code it contains runs with your privileges.
# Review any third-party change to it (pull request, copied file) as code.
# The ${VAR:-default} form allows one-off overrides via the environment,
# e.g.: PROMPT="test" ./ping.sh

# Ping times (machine LOCAL time), HH:MM format, space-separated.
# Ideally spaced >= 5h apart so each ping opens a new quota window.
PING_TIMES="${PING_TIMES:-07:00 12:00 17:00}"

# Model and message sent. Haiku + minimal message = negligible quota cost.
MODEL="${MODEL:-haiku}"
PROMPT="${PROMPT:-hi}"

# Max duration of one call in seconds (applied if `timeout` is available).
PING_TIMEOUT="${PING_TIMEOUT:-120}"

# Wait before the single retry on transient errors.
RETRY_DELAY="${RETRY_DELAY:-30}"

# Path to the claude binary (installed by https://claude.ai/install.sh).
CLAUDE_BIN="${CLAUDE_BIN:-$HOME/.local/bin/claude}"

# Log file. Empty = <repo>/logs/ping.log
# If you place it elsewhere in the repo, keep the .log extension
# (covered by .gitignore) so your logs are never committed.
LOG_FILE="${LOG_FILE:-}"

# Above this number of lines, the log is truncated to the last half.
MAX_LOG_LINES="${MAX_LOG_LINES:-2000}"
