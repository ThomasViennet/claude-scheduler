# Configuration de claude-scheduler.
# Fichier sourcé par ping.sh et apply-schedule.sh.
# La forme ${VAR:-défaut} permet de surcharger ponctuellement une valeur
# via l'environnement, ex. : PROMPT="test" ./ping.sh

# Heures d'envoi du ping (heure LOCALE de la machine), format HH:MM,
# séparées par des espaces. Idéalement espacées de >= 5h pour que chaque
# ping ouvre une nouvelle fenêtre de quota.
PING_TIMES="${PING_TIMES:-07:00 12:00 17:00}"

# Modèle et message envoyés. Haiku + message minimal = consommation négligeable.
MODEL="${MODEL:-haiku}"
PROMPT="${PROMPT:-hi}"

# Délai max d'un appel en secondes (appliqué si `timeout` est disponible).
PING_TIMEOUT="${PING_TIMEOUT:-120}"

# Attente avant l'unique nouvelle tentative en cas d'erreur transitoire.
RETRY_DELAY="${RETRY_DELAY:-30}"

# Chemin du binaire claude (installé par https://claude.ai/install.sh).
CLAUDE_BIN="${CLAUDE_BIN:-$HOME/.local/bin/claude}"

# Fichier de log. Vide = <repo>/logs/ping.log
LOG_FILE="${LOG_FILE:-}"

# Au-delà de ce nombre de lignes, le log est tronqué aux 1000 dernières.
MAX_LOG_LINES="${MAX_LOG_LINES:-2000}"
